name: Build TikTok for iPhone 4S (iOS 9)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 13 (armv7 compatible)
        run: |
          for ver in 13.4.1 13.4 13.3.1 13.3 13.2.1 13.2 13.1 13.0; do
            path="/Applications/Xcode_$ver.app"
            if [ -d "$path" ]; then
              sudo xcode-select -s "$path"
              echo "Using Xcode $ver"
              break
            fi
          done
          xcodebuild -version

      - name: Install xcodegen
        run: |
          brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null
          xcodegen --version

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate --project . --spec project.yml

      - name: Build
        working-directory: ios
        run: |
          xcodebuild clean build \
            -project TikTokClient.xcodeproj \
            -scheme TikTokClient \
            -sdk iphoneos \
            -configuration Debug \
            IPHONEOS_DEPLOYMENT_TARGET=9.0 \
            ARCHS="armv7 arm64" \
            VALID_ARCHS="armv7 arm64" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR="$(pwd)/build" \
            2>&1 | tee build.log

      - name: Check + Package
        run: |
          if grep -q "BUILD SUCCEEDED" ios/build.log; then
            echo "✅ Build OK"
            if [ -d ios/build/TikTok.app ]; then
              cd ios && zip -r ../TikTok-iOS9-iphone4s.zip build/TikTok.app && cd ..
              ls -lh TikTok-iOS9-iphone4s.zip
            fi
          else
            echo "❌ Build failed"
            tail -30 ios/build.log
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TikTok-iOS9-iphone4s
          path: TikTok-iOS9-iphone4s.zip
          compression-level: 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log
