name: Build TikTok for iPhone 4S (iOS 9)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode versions available
        run: |
          echo "Default Xcode:"
          xcodebuild -version
          echo ""
          echo "All Xcode installations:"
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "Only default"

      - name: Select Xcode 13 for armv7 support
        run: |
          # Xcode 13 is the last version that supports armv7 (iPhone 4S)
          if [ -d "/Applications/Xcode_13.4.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_13.4.1.app
          elif [ -d "/Applications/Xcode_13.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_13.4.app
          elif [ -d "/Applications/Xcode_13.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_13.3.app
          elif [ -d "/Applications/Xcode_13.2.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_13.2.1.app
          elif [ -d "/Applications/Xcode_13.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_13.1.app
          elif [ -d "/Applications/Xcode_13.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_13.0.app
          else
            echo "⚠️  No Xcode 13 found. armv7 architecture may not be available."
            echo "iPhone 4S build will use arm64 only (won't run on device)"
            xcodebuild -version
          fi

      - name: Install xcodegen
        run: |
          brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null
          xcodegen --version

      - name: Show SDKs
        run: |
          echo "Available SDKs:"
          xcodebuild -showsdks
          echo ""
          echo "Available archs for iphoneos:"
          xcodebuild -sdk iphoneos -arch armv7 -showBuildSettings 2>/dev/null | grep ARCHS || echo "armv7 NOT supported by this Xcode"

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate --project . --spec project.yml
          ls -la TikTokClient.xcodeproj/

      - name: Build for iOS 9 (armv7 + arm64)
        run: |
          cd ios
          xcodebuild clean build \
            -project TikTokClient.xcodeproj \
            -scheme TikTokClient \
            -sdk iphoneos \
            -configuration Debug \
            IPHONEOS_DEPLOYMENT_TARGET=9.0 \
            ARCHS="armv7 arm64" \
            VALID_ARCHS="armv7 arm64" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR="$(pwd)/build" \
            2>&1 | tee build.log

      - name: Check build status
        run: |
          if grep -q "BUILD SUCCEEDED" ios/build.log; then
            echo "✅ Build succeeded!"
          else
            echo "❌ Build failed - last 50 lines:"
            tail -50 ios/build.log
            exit 1
          fi

      - name: Package .app
        run: |
          if [ -d "ios/build/TikTok.app" ]; then
            echo "Found .app at ios/build/TikTok.app"
            cd ios
            zip -r "../TikTok-iOS9-iphone4s.zip" "build/TikTok.app"
            cd ..
            ls -lh TikTok-iOS9-iphone4s.zip
          else
            echo "Searching for built .app..."
            find ios/build -name "*.app" -type d 2>/dev/null
            find ~/Library/Developer/Xcode/DerivedData -name "TikTok.app" -type d 2>/dev/null | head -5
          fi

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: TikTok-iOS9-iphone4s
          path: TikTok-iOS9-iphone4s.zip
          compression-level: 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log

      - name: Summary
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          if grep -q "BUILD SUCCEEDED" ios/build.log; then
            echo "| Build | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            echo "| Artifact | \`TikTok-iOS9-iphone4s.zip\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Build | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Target | iPhone 4S (iOS 9.3.6) |" >> $GITHUB_STEP_SUMMARY
          echo "| Architectures | armv7 + arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installing on iPhone 4S" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`TikTok-iOS9-iphone4s.zip\` from artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Extract to get \`TikTok.app\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Use **Sideloadly** (https://sideloadly.io) or **AltStore** to sideload" >> $GITHUB_STEP_SUMMARY
          echo "4. Configure server URL in app settings" >> $GITHUB_STEP_SUMMARY
